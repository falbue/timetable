name: Сборка и публикация образа

on:
  push:
    tags:
      - '*'
  workflow_dispatch:


jobs:
  check-tags:
    runs-on: ubuntu-latest
    outputs:
        tag: ${{ steps.version.outputs.tag }}
        release: ${{ steps.version.outputs.release }}
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Определение версии
        id: version
        run: |
          tag=false
          release=false
          # Определяем, что было выбрано: branch или tag
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
            SEGMENTS=$(echo "$TAG_NAME" | tr '.' '\n' | wc -l)
            if [ "$SEGMENTS" -le 3 ]; then
              echo "release=true" >> $GITHUB_OUTPUT
            else
              echo "release=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "tag=false" >> $GITHUB_OUTPUT
            echo "release=false" >> $GITHUB_OUTPUT
          fi
  build:
    needs: check-tags
    if: needs.check-tags.outputs.tag != 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Вход в GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Нормализация имени образа в нижний регистр
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Сборка и публикация образа
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ needs.check-tags.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest

  create-release:
    runs-on: ubuntu-latest
    needs: check-tags
    if: needs.check-tags.outputs.release == 'true'
    permissions:
      contents: write
    steps:
      - name: Создание релиза
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-tags.outputs.tag }}
          name: Релиз ${{ needs.check-tags.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [check-tags, build]
    if: needs.check-tags.outputs.tag != 'false' && success()
    runs-on: ubuntu-latest
    steps:
      - name: Создание деплоя через Deploy API
        env:
          DEPLOY_API_URL: https://deploy.falbue.ru
          DEPLOY_API_KEY: ${{ secrets.DEPLOY_API_KEY }}
          TAG: ${{ needs.check-tags.outputs.tag }}
          OWNER_REPO: ${{ github.repository }}
        run: |
          if [ -z "$DEPLOY_API_URL" ] || [ -z "$DEPLOY_API_KEY" ]; then
            echo "::error::Не заданы DEPLOY_API_URL или DEPLOY_API_KEY"
            exit 1
          fi

          PAYLOAD=$(jq -nc \
            --arg owner_repo "$OWNER_REPO" \
            --arg tag "$TAG" \
            '{
              "owner_repo": $owner_repo,
              "tag": $tag,
              "run_deploy": true
            }')

          RESPONSE=$(curl --fail-with-body -sS -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $DEPLOY_API_KEY" \
            -d "$PAYLOAD" \
            "$DEPLOY_API_URL/deployments")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Деплой успешно инициирован."
          else
            echo "::error::Ошибка при создании деплоя. HTTP Code: $HTTP_CODE"
            echo "Ответ сервера: $BODY"
            exit 1
          fi